<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tacadinha Mod</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root { --primary: #00c2ff; --glow: rgba(0, 194, 255, 0.6); --bg: #020306; --success: #00ff88; }

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

/* BODY AJUSTADO */
body { 
    background: var(--bg); 
    color: white; 
    overflow-x: hidden;
    position: relative;
    z-index: 0;
}

/* IMAGEM BORRADA */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;

    background: url('fundo.png') no-repeat center center;
    background-size: cover;

    filter: blur(12px);
    transform: scale(1.1);
    z-index: -2;
}

/* ESCURECIMENTO */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;

    background: rgba(0,0,0,0.65);
    z-index: -1;
}

.container { max-width: 500px; margin: auto; padding: 30px 20px; text-align: center; }

.logo { font-family: 'Orbitron'; font-size: 42px; letter-spacing: 5px; }

@keyframes glowPulse {
0% { text-shadow: 0 0 5px #00c2ff; }
50% { text-shadow: 0 0 25px #00c2ff; }
100% { text-shadow: 0 0 5px #00c2ff; }
}

.logo span { color: #00f7ff; animation: glowPulse 1.5s infinite; }

.tagline { font-size: 11px; color: #555; letter-spacing: 5px; margin-bottom: 25px; }

.system-status { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }

.status-box {
    background: rgba(255,255,255,0.03);
    padding: 15px 5px;
    border-radius: 15px;
    font-size: 10px;
    font-weight: 900;
}

.status-box.on { 
    color: var(--success); 
    box-shadow: 0 0 15px rgba(0,255,136,0.3);
}

.antiban-badge {
    background: linear-gradient(90deg, #00ff88, #00c2ff);
    color: #000;
    padding: 8px 25px;
    border-radius: 50px;
    font-weight: 900;
    margin-bottom: 20px;
}

.main-video {
    width: 100%;
    padding-bottom: 56.25%;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 30px;
}

.main-video iframe {
    position: absolute;
    width: 100%;
    height: 100%;
}

.btn-supreme {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 10px;
    font-weight: 900;
    text-decoration: none;
}

.btn-buy { background: #00c2ff; color: #000; }
.btn-trial { background: #25d366; color: #fff; }
.btn-test { background: rgba(255,255,255,0.1); color: #fff; }

.footer-nav { margin-top: 40px; }
.footer-nav a { color: #555; margin: 0 10px; font-size: 12px; }

</style>
</head>

<body>

<div class="container">

<div class="logo">Tacadinha <span>Mod</span></div>
<span class="tagline">The Ultimate System</span>

<div class="system-status">
<div class="status-box on"><i class="fab fa-android"></i><br>Android</div>
<div class="status-box on"><i class="fab fa-apple"></i><br>iOS</div>
<div class="status-box on"><i class="fas fa-desktop"></i><br>PC</div>
</div>

<div class="antiban-badge">
<i class="fas fa-user-shield"></i> 100% Anti-Ban
</div>

<div class="main-video">
<iframe src="https://www.youtube.com/embed/wrXRZGIkKkY" allowfullscreen></iframe>
</div>

<a href="#" class="btn-supreme btn-buy">VER PLANOS</a>
<a href="#" class="btn-supreme btn-trial">Teste Grátis</a>
<a href="#" class="btn-supreme btn-test">Grupo</a>

<div class="footer-nav">
<a href="#">Resgate</a>
<a href="#">Suporte</a>
</div>

</div>

</body>
</html>
